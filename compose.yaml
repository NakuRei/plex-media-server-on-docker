services:
  plex:
    container_name: plex
    image: plexinc/pms-docker:latest
    restart: unless-stopped
    network_mode: host  # Recommended to use host mode if you want to use DLNA, etc.
    environment:
      - TZ=${TZ}  # Timezone (e.g., "America/New_York")
      - PLEX_UID=${PLEX_UID}  # Host user ID (check with `id` command)
      - PLEX_GID=${PLEX_GID}  # Host group ID
      - PLEX_CLAIM=${PLEX_CLAIM}  # Plex claim code (optional, for linking with Plex account)
    volumes:
      - ./config:/config  # Plex configuration storage
      - /mnt/nas_buffalo:/data/music  # NAS-mounted music folder
