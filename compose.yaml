services:
  plex:
    container_name: plex
    image: plexinc/pms-docker:latest
    restart: unless-stopped
    network_mode: host  # DLNAなどを使いたい場合はhost推奨
    environment:
      - TZ=${TZ}  # タイムゾーン
      - PLEX_UID=${PLEX_UID}  # ホストユーザーID（`id` コマンドで確認）
      - PLEX_GID=${PLEX_GID}  # ホストグループID
      - PLEX_CLAIM=${PLEX_CLAIM}  # Plexのclaimコード（任意、Plexアカウントと紐付けたい場合）
    volumes:
      - ./config:/config  # Plexの設定保存先
      - /mnt/nas_buffalo:/data/music  # NASをマウントした音楽フォルダ
